name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ format('https://{0}.github.io', github.repository_owner) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: withastro/action@v4
        with:
          path: .
